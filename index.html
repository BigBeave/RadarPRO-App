<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar PRO MOBILE TEST</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0f14;
    color:#e6edf3;
    margin:0;
}
header{
    background:#111827;
    padding:14px;
    font-weight:bold;
}
#searchBar{
    width:95%;
    margin:10px;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
}

.mobileCard{
    background:#0f172a;
    margin:10px;
    padding:14px;
    border-radius:10px;
}
.mobileTitle{
    font-size:16px;
    font-weight:bold;
}
.mobileSub{
    font-size:13px;
    color:#9ca3af;
    margin-bottom:10px;
}
button.action{
    background:#1f2937;
    color:white;
    border:none;
    padding:6px 10px;
    margin-right:6px;
    border-radius:6px;
}
</style>
</head>

<body>

<header>Prospect {{{Radar}}} MOBILE TEST</header>

<input id="searchBar" placeholder="Search ANY column…">

<div id="body"></div>

<script>

const API="https://radarpro-api.onrender.com/data";

let ALL=[];
let FILTERED=[];

const body=document.getElementById("body");
const searchBar=document.getElementById("searchBar");

async function load(){

    const res=await fetch(API);
    const json=await res.json();

    ALL=Array.isArray(json)?json:(json.items||json.data||[]);

    FILTERED=ALL;
    render();
}

function render(){

    body.innerHTML="";

    const MAX=200;
    const rows=FILTERED.slice(0,MAX);

    rows.forEach(row=>{

        const card=document.createElement("div");
        card.className="mobileCard";

        card.innerHTML=`
            <div class="mobileTitle">${row.Company||""}</div>
            <div class="mobileSub">${row.City||""} ${row.State||""}</div>

            <button class="action" onclick="window.open('tel:${row.Phone||""}')">📞</button>
            <button class="action" onclick="window.open('${row.Website||"#"}','_blank')">🌐</button>
            <button class="action" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((row.Address||"")+" "+(row.City||"")+" "+(row.State||""))}')">🧭</button>
        `;

        body.appendChild(card);
    });
}

searchBar.addEventListener("input",()=>{
    const q=searchBar.value.toLowerCase();

    if(!q){
        FILTERED=ALL;
        render();
        return;
    }

    FILTERED=ALL.filter(r=>
        Object.values(r).some(v=>
            String(v||"").toLowerCase().includes(q)
        )
    );

    render();
});

load();

</script>

</body>
</html>
