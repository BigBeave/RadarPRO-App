<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- BUILD: V6.3-DELTA-01 -->

<title>{{{PROSPECT•RADAR}}} v6.3</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#06142b,#02060f);
color:white;
}

header{
position:sticky;
top:0;
z-index:100;
background:#03122a;
padding:14px;
font-size:20px;
font-weight:bold;
text-align:center;
letter-spacing:1px;
box-shadow:0 4px 20px rgba(0,0,0,.5);
}

.container{
padding:12px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

input,select{
padding:10px;
border-radius:10px;
border:none;
background:#081c3b;
color:white;
}

.card{
background:#081c3b;
margin-bottom:10px;
padding:14px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.4);
}

.company{
font-size:18px;
font-weight:bold;
}

.city{
opacity:.7;
}

.actions{
margin-top:8px;
display:flex;
gap:10px;
}

.btn{
background:#0e2c63;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

.states{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
}

.state{
background:#0c244f;
padding:6px 10px;
border-radius:10px;
cursor:pointer;
font-size:12px;
}

.state.active{
background:#2c64ff;
}

</style>
</head>

<body>

<header>
{{{PROSPECT•RADAR}}} v6.3
</header>

<div class="container">

<div class="filters">

<input id="searchBox" placeholder="Industry / Keyword Search">

<select id="scoreFilter">
<option value="0">Score Any</option>
<option value="25">25+</option>
<option value="50">50+</option>
<option value="75">75+</option>
</select>

<select id="limitFilter">
<option value="25">25 Results</option>
<option value="50">50 Results</option>
<option value="100">100 Results</option>
<option value="1000">1000 Results</option>
<option value="999999">All</option>
</select>

</div>

<div class="states" id="states"></div>

<div id="results"></div>

</div>

<script>

const API="https://radarpro-api.onrender.com/data";

let DATA=[];
let ACTIVE_STATES=[];

const STATES=["OH","MI","IN","KY","PA","WV","TN","NC"];

const stateWrap=document.getElementById("states");

STATES.forEach(s=>{
let div=document.createElement("div");
div.className="state active";
div.innerText=s;
ACTIVE_STATES.push(s);
div.onclick=()=>{
if(ACTIVE_STATES.includes(s)){
ACTIVE_STATES=ACTIVE_STATES.filter(x=>x!==s);
div.classList.remove("active");
}else{
ACTIVE_STATES.push(s);
div.classList.add("active");
}
render();
};
stateWrap.appendChild(div);
});

fetch(API)
.then(r=>r.json())
.then(d=>{
DATA=d;
render();
});

document.getElementById("searchBox").oninput=render;
document.getElementById("scoreFilter").onchange=render;
document.getElementById("limitFilter").onchange=render;

function render(){

let keyword=document.getElementById("searchBox").value.toLowerCase();
let score=parseInt(document.getElementById("scoreFilter").value);
let limit=parseInt(document.getElementById("limitFilter").value);

let res=DATA.filter(x=>{

if(!ACTIVE_STATES.includes(x["State"])) return false;

if(parseInt(x["Score"]||0)<score) return false;

if(keyword){
let joined=Object.values(x).join(" ").toLowerCase();
if(!joined.includes(keyword)) return false;
}

return true;

}).slice(0,limit);

let html="";

res.forEach(r=>{

let map=`https://maps.apple.com/?q=${encodeURIComponent(r.Company+" "+r.Address+" "+r.City+" "+r.State)}`;
let tel=`tel:${r.Phone||""}`;
let mail=`mailto:${r["Company Email"]||""}`;

html+=`
<div class="card">
<div class="company">${r.Company||""}</div>
<div class="city">${r.City||""}, ${r.State||""}</div>

<div class="actions">
<div class="btn" onclick="window.open('${tel}')">Call</div>
<div class="btn" onclick="window.open('${mail}')">Email</div>
<div class="btn" onclick="window.open('${map}')">Route</div>
</div>
</div>
`;

});

document.getElementById("results").innerHTML=html;

}

</script>

</body>
</html>
