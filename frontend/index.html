<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#080b10;--bg-panel:#0d1117;--bg-card:#0f1923;
  --accent:#00c2ff;--accent-dim:#004e66;--accent-glow:rgba(0,194,255,0.15);
  --gold:#f5a623;--gold-dim:rgba(245,166,35,0.12);
  --green:#34d399;--green-dim:rgba(52,211,153,0.12);
  --white:#f0f4f8;--muted:#6b7a8d;--border:rgba(255,255,255,0.07);
  --row-a-bg:#0d1117;--row-a-text:#e8edf2;
  --row-b-bg:#e8edf2;--row-b-text:#0d1117;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-deep);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(0,194,255,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(245,166,35,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* HOME */
#home{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 24px 32px;}
.logo-wrap{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.logo-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#0070a8);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px rgba(0,194,255,0.4);}
.logo-text{font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;letter-spacing:1px;}
.logo-text span{color:var(--accent);text-shadow:0 0 20px rgba(0,194,255,0.5);}
.logo-badge{font-size:11px;color:var(--accent);background:var(--accent-glow);border:1px solid var(--accent-dim);padding:3px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;align-self:flex-start;margin-top:8px;}
.mode-tabs{display:flex;gap:8px;margin-bottom:22px;}
.tab{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-panel);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-align:center;}
.tab:hover{border-color:var(--accent-dim);color:var(--accent);}
.tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px var(--accent-glow);}
.search-panel{display:none;}.search-panel.active{display:block;}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
.input-wrap{position:relative;margin-bottom:12px;}
.input-wrap input{width:100%;padding:13px 18px 13px 44px;background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.input-wrap input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow);}
.input-wrap input:disabled{opacity:0.45;cursor:not-allowed;}
.input-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
.radius-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
.radius-row input[type=range]{flex:1;padding:0;background:transparent;border:none;accent-color:var(--accent);cursor:pointer;}
.radius-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);min-width:70px;text-align:right;}
#loadingMsg{font-size:13px;color:var(--muted);margin:8px 2px 14px;min-height:18px;display:flex;align-items:center;gap:6px;}
#loadingMsg.error{color:#f87171;}#loadingMsg.success{color:#34d399;}
#states{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.stateBtn{padding:7px 14px;border-radius:8px;background:var(--bg-panel);border:1px solid var(--border);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.15s;user-select:none;}
.stateBtn:hover{border-color:var(--accent-dim);color:var(--accent);}
.stateBtn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px var(--accent-glow);}
.run-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#0070a8);color:#000;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;transition:opacity 0.2s,box-shadow 0.2s;box-shadow:0 4px 24px rgba(0,194,255,0.3);}
.run-btn:hover:not(:disabled){opacity:0.9;box-shadow:0 4px 32px rgba(0,194,255,0.5);}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.run-btn.gold{background:linear-gradient(135deg,var(--gold),#c07a10);box-shadow:0 4px 24px rgba(245,166,35,0.35);}
.run-btn.gold:hover:not(:disabled){box-shadow:0 4px 32px rgba(245,166,35,0.55);}
#geocodeStatus{padding:10px 14px;border-radius:8px;background:var(--accent-glow);border:1px solid var(--accent-dim);font-size:13px;color:var(--accent);margin-bottom:14px;display:none;}
#geocodeStatus.visible{display:block;}
#geocodeStatus.error{background:rgba(248,113,113,0.1);border-color:#f87171;color:#f87171;}

/* WORKSPACE */
#workspace{display:none;height:100vh;position:relative;z-index:1;}
#workspace.visible{display:flex;}
#left{width:36%;min-width:260px;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.left-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.left-logo{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;}
#resultCount{font-size:12px;color:var(--muted);background:var(--bg-card);padding:3px 8px;border-radius:20px;border:1px solid var(--border);}
.left-actions{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.left-actions button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;}
.left-actions button:hover{border-color:var(--accent-dim);color:var(--accent);}
.back-btn{color:var(--accent)!important;border-color:var(--accent-dim)!important;}
.route-all-btn{color:var(--gold)!important;border-color:rgba(245,166,35,0.3)!important;}
#resultList{overflow-y:auto;flex:1;}
.result{padding:13px 16px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.15);transition:filter 0.1s;position:relative;}
.result:nth-child(even){background:var(--row-a-bg);color:var(--row-a-text);}
.result:nth-child(odd){background:var(--row-b-bg);color:var(--row-b-text);}
.result:nth-child(odd) .result-sub{color:#555;}
.result:nth-child(even) .result-sub{color:var(--muted);}
.result:hover{filter:brightness(1.08);}
.result.active{background:var(--accent-dim)!important;color:var(--accent)!important;border-left:3px solid var(--accent);box-shadow:inset 0 0 20px var(--accent-glow);}
.result.active .result-sub{color:rgba(0,194,255,0.7)!important;}
.result-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:0.5px;}
.result-sub{font-size:12px;margin-top:2px;}
.result-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:600;padding:2px 6px;border-radius:4px;}
.result-badge.score{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(245,166,35,0.25);}
.result-badge.dist{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,211,153,0.25);}
#right{flex:1;padding:24px;overflow-y:auto;background:var(--bg-deep);}
#routeBanner{display:none;margin-bottom:16px;padding:12px 16px;background:var(--gold-dim);border:1px solid rgba(245,166,35,0.3);border-radius:10px;font-size:13px;color:var(--gold);align-items:center;gap:10px;}
#routeBanner.visible{display:flex;}
#routeBanner button{margin-left:auto;padding:7px 16px;background:var(--gold);color:#000;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;max-width:700px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4);margin-bottom:16px;}
.card-header{background:linear-gradient(135deg,#0f1f2e,#0a1520);border-bottom:1px solid var(--border);padding:22px 24px;position:relative;overflow:hidden;}
.card-header::after{content:'📡';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:44px;opacity:0.06;}
.card-company{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--white);letter-spacing:0.5px;margin-bottom:6px;}
.card-meta{font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;}
.card-body{padding:20px 24px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.info-item{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.info-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px;}
.info-value{font-size:14px;color:var(--white);font-weight:500;word-break:break-word;}
.score-bar-wrap{margin-bottom:18px;}
.score-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;}
.score-bar-bg{background:var(--bg-panel);border-radius:6px;height:8px;overflow:hidden;margin-bottom:4px;}
.score-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:6px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.score-value{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.actions-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
.action-btn{padding:11px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg-panel);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.action-btn:hover{border-color:var(--accent-dim);color:var(--accent);background:var(--accent-glow);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,194,255,0.15);}
.action-btn.maps{border-color:rgba(52,211,153,0.3);color:var(--green);background:var(--green-dim);}
.action-btn.maps:hover{border-color:var(--green);background:rgba(52,211,153,0.18);}
.action-btn.route{border-color:rgba(245,166,35,0.3);color:var(--gold);background:var(--gold-dim);}
.action-btn.route:hover{border-color:var(--gold);background:rgba(245,166,35,0.18);}

/* DAY PLANNER */
.planner-card{background:var(--bg-card);border:1px solid rgba(245,166,35,0.2);border-radius:16px;max-width:700px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
.planner-header{background:linear-gradient(135deg,#1a1200,#100e00);border-bottom:1px solid rgba(245,166,35,0.15);padding:20px 24px;}
.planner-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.planner-sub{font-size:13px;color:var(--muted);}
.planner-body{padding:20px 24px;}
.planner-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-box{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-num{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--accent);}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.stop-list{margin-bottom:20px;}
.stop{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.stop:last-child{border-bottom:none;}
.stop-num{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stop-info{flex:1;}
.stop-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--white);}
.stop-detail{font-size:12px;color:var(--muted);margin-top:2px;}
.stop-dist{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--green);white-space:nowrap;}
.planner-btns{display:flex;gap:10px;flex-wrap:wrap;}
.planner-btn{flex:1;padding:13px;border-radius:10px;border:none;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.planner-btn.primary{background:linear-gradient(135deg,var(--gold),#c07a10);color:#000;box-shadow:0 4px 20px rgba(245,166,35,0.3);}
.planner-btn.primary:hover{box-shadow:0 4px 28px rgba(245,166,35,0.5);}
.planner-btn.secondary{background:var(--bg-panel);color:var(--accent);border:1px solid var(--accent-dim);}
.planner-btn.secondary:hover{background:var(--accent-glow);}
</style>
</head>
<body>

<div id="home">
  <div class="logo-wrap">
    <div class="logo-icon">📡</div>
    <div><div class="logo-text">Prospect <span>Radar</span></div></div>
    <div class="logo-badge">LIVE v4</div>
  </div>

  <div class="mode-tabs">
    <div class="tab active" id="tabKeyword" onclick="switchTab('keyword')">🔍 Keyword Search</div>
    <div class="tab" id="tabRadius" onclick="switchTab('radius')">📍 Radius + Day Plan</div>
  </div>

  <div id="loadingMsg">⏳ Connecting to Radar PRO database...</div>

  <!-- KEYWORD PANEL -->
  <div class="search-panel active" id="panelKeyword">
    <div class="input-wrap">
      <span class="input-icon">🔍</span>
      <input id="kw" placeholder="Keyword — company, city, industry..." disabled>
    </div>
    <div class="section-label">Filter by State</div>
    <div id="states"></div>
    <button class="run-btn" id="searchBtn" onclick="runKeywordSearch()" disabled>⚡ Run Search</button>
  </div>

  <!-- RADIUS PANEL -->
  <div class="search-panel" id="panelRadius">
    <div class="input-wrap">
      <span class="input-icon">📍</span>
      <input id="radiusLocation" placeholder="City, address, or zip code..." disabled>
    </div>
    <div class="input-wrap">
      <span class="input-icon">🏭</span>
      <input id="radiusKeyword" placeholder="Keyword filter (optional)" disabled>
    </div>
    <div class="section-label">Search Radius</div>
    <div class="radius-row">
      <input type="range" id="radiusSlider" min="5" max="150" value="35" oninput="updateRadius()">
      <div class="radius-val"><span id="radiusDisplay">35</span> mi</div>
    </div>
    <div id="geocodeStatus"></div>
    <button class="run-btn gold" id="radiusBtn" onclick="runRadiusSearch()" disabled>🗺️ Build My Sales Day Plan</button>
  </div>
</div>

<div id="workspace">
  <div id="left">
    <div class="left-header">
      <div class="left-logo">📡 Radar PRO</div>
      <div id="resultCount">0 results</div>
    </div>
    <div class="left-actions">
      <button class="back-btn" onclick="goHome()">⬅ Search</button>
      <button class="route-all-btn" onclick="openAllRoute()">🗺️ Route All</button>
    </div>
    <div id="resultList"></div>
  </div>
  <div id="right">
    <div id="routeBanner">
      <span>🗺️ <span id="routeCount">0</span> prospects ready for routing</span>
      <button onclick="openAllRoute()">Open in Google Maps</button>
    </div>
    <div id="detail"></div>
  </div>
</div>

<script>
const API="https://radarpro-api.onrender.com";
let DATA=[],RESULTS=[],ACTIVE_STATES=[],ACTIVE_INDEX=-1,CURRENT_MODE="keyword",RADIUS_CENTER=null;
const STATE_LIST=["OH","IN","MI","KY","TN","WV","PA","AL"];

function safe(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function txt(s){return String(s||"").trim();}

function switchTab(m){
  CURRENT_MODE=m;
  ["keyword","radius"].forEach(t=>{
    document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active",t===m);
    document.getElementById("panel"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active",t===m);
  });
}

function updateRadius(){
  document.getElementById("radiusDisplay").textContent=document.getElementById("radiusSlider").value;
}

function initStates(){
  const el=document.getElementById("states");
  STATE_LIST.forEach(s=>{
    const d=document.createElement("span");
    d.className="stateBtn";d.textContent=s;
    d.onclick=()=>{
      d.classList.toggle("active");
      ACTIVE_STATES=ACTIVE_STATES.includes(s)?ACTIVE_STATES.filter(x=>x!==s):[...ACTIVE_STATES,s];
    };
    el.appendChild(d);
  });
}

async function load(){
  const msg=document.getElementById("loadingMsg");
  const allBtns=[document.getElementById("searchBtn"),document.getElementById("radiusBtn")];
  const allInputs=[document.getElementById("kw"),document.getElementById("radiusLocation"),document.getElementById("radiusKeyword")];
  try{
    const r=await fetch(API+"/data");
    if(!r.ok)throw new Error("Server "+r.status);
    const raw=await r.json();
    const arr=Array.isArray(raw)?raw:(raw.items||[]);
    DATA=arr.map(row=>{
      const c={};
      Object.keys(row).forEach(k=>{c[k.trim()]=row[k];});
      c.Score=Number(c.Score||0);
      c.Lat=parseFloat(c.Lat)||null;
      c.Lon=parseFloat(c.Lon)||null;
      return c;
    });
    const withCoords=DATA.filter(d=>d.Lat&&d.Lon).length;
    msg.className="success";
    msg.textContent=`✅ ${DATA.length.toLocaleString()} prospects — ${withCoords.toLocaleString()} with GPS coords ready for radius search!`;
    allInputs.forEach(i=>i.disabled=false);
    allBtns.forEach(b=>b.disabled=false);
    setTimeout(()=>{msg.textContent="";},6000);
  }catch(err){
    msg.className="error";
    msg.textContent="❌ Connection failed. Please refresh.";
  }
  initStates();
}

function runKeywordSearch(){
  const kw=document.getElementById("kw").value.toLowerCase().trim();
  RESULTS=DATA.filter(o=>{
    if(ACTIVE_STATES.length&&!ACTIVE_STATES.includes(o.State))return false;
    if(kw)return Object.values(o).some(v=>String(v).toLowerCase().includes(kw));
    return true;
  }).sort((a,b)=>b.Score-a.Score);
  CURRENT_MODE="keyword";
  showWorkspace();
}

async function runRadiusSearch(){
  const location=document.getElementById("radiusLocation").value.trim();
  const keyword=document.getElementById("radiusKeyword").value.trim();
  const miles=document.getElementById("radiusSlider").value;
  const status=document.getElementById("geocodeStatus");
  if(!location){status.className="visible error";status.textContent="⚠️ Please enter a city, address, or zip code.";return;}
  status.className="visible";status.textContent="🔍 Locating "+location+"...";
  document.getElementById("radiusBtn").disabled=true;
  try{
    const gr=await fetch(API+"/geocode?q="+encodeURIComponent(location));
    const gd=await gr.json();
    if(!gd.found){status.className="visible error";status.textContent="❌ Location not found. Try a zip code or city, state.";document.getElementById("radiusBtn").disabled=false;return;}
    RADIUS_CENTER={lat:gd.lat,lon:gd.lon,label:location};
    status.textContent="📡 Scanning "+miles+" mile radius around "+location+"...";
    let url=API+"/radius?lat="+gd.lat+"&lon="+gd.lon+"&miles="+miles;
    if(keyword)url+="&keyword="+encodeURIComponent(keyword);
    const rr=await fetch(url);
    const rd=await rr.json();
    RESULTS=rd.results||[];
    status.className="";
    document.getElementById("radiusBtn").disabled=false;
    CURRENT_MODE="radius";
    showWorkspace();
  }catch(err){
    status.className="visible error";
    status.textContent="❌ Search failed. Please try again.";
    document.getElementById("radiusBtn").disabled=false;
  }
}

function showWorkspace(){
  document.getElementById("home").style.display="none";
  document.getElementById("workspace").classList.add("visible");
  renderResults();
}

function renderResults(){
  const list=document.getElementById("resultList");
  const countEl=document.getElementById("resultCount");
  const routeCount=document.getElementById("routeCount");
  const routeBanner=document.getElementById("routeBanner");
  const detail=document.getElementById("detail");

  countEl.textContent=RESULTS.length.toLocaleString()+" results";
  routeCount.textContent=Math.min(RESULTS.length,10);
  if(RESULTS.length>1)routeBanner.classList.add("visible");
  else routeBanner.classList.remove("visible");

  list.innerHTML="";
  RESULTS.forEach((x,i)=>{
    const div=document.createElement("div");
    div.className="result";
    const name=document.createElement("div");name.className="result-name";name.textContent=x.Company||"—";
    const sub=document.createElement("div");sub.className="result-sub";sub.textContent=[x.City,x.State].filter(Boolean).join(", ");
    div.appendChild(name);div.appendChild(sub);
    if(CURRENT_MODE==="radius"&&x._distance!=null){
      const b=document.createElement("div");b.className="result-badge dist";b.textContent=x._distance+" mi";div.appendChild(b);
    }else if(x.Score){
      const b=document.createElement("div");b.className="result-badge score";b.textContent=x.Score;div.appendChild(b);
    }
    div.onclick=()=>openDetail(i);
    list.appendChild(div);
  });

  if(CURRENT_MODE==="radius"&&RESULTS.length>0){showDayPlanner();}
  else if(RESULTS.length>0){openDetail(0);}
}

function showDayPlanner(){
  const detail=document.getElementById("detail");
  detail.innerHTML="";
  const stops=RESULTS.slice(0,10);
  const totalMiles=stops.reduce((s,x)=>s+(x._distance||0),0);
  const estHours=Math.round((totalMiles/45)*10)/10;

  const pc=document.createElement("div");pc.className="planner-card";
  pc.innerHTML=`
    <div class="planner-header">
      <div class="planner-title">🗺️ Sales Day Plan</div>
      <div class="planner-sub">${txt(RADIUS_CENTER?RADIUS_CENTER.label:"Your location")} · ${document.getElementById("radiusSlider").value} mile radius · ${RESULTS.length} prospects found</div>
    </div>
    <div class="planner-body">
      <div class="planner-stats">
        <div class="stat-box"><div class="stat-num">${stops.length}</div><div class="stat-label">Top Stops</div></div>
        <div class="stat-box"><div class="stat-num">${Math.round(totalMiles)}</div><div class="stat-label">Est. Miles</div></div>
        <div class="stat-box"><div class="stat-num">${estHours}h</div><div class="stat-label">Drive Time</div></div>
      </div>
      <div class="stop-list">
        ${stops.map((x,i)=>`
          <div class="stop">
            <div class="stop-num">${i+1}</div>
            <div class="stop-info">
              <div class="stop-name">${safe(x.Company)}</div>
              <div class="stop-detail">${safe([x.Address,x.City,x.State].filter(Boolean).join(", "))}${x.Phone?" · "+safe(x.Phone):""}</div>
            </div>
            <div class="stop-dist">${x._distance} mi</div>
          </div>
        `).join("")}
      </div>
      <div class="planner-btns">
        <button class="planner-btn primary" onclick="openAllRoute()">🧭 Open Full Route in Google Maps</button>
        <button class="planner-btn secondary" onclick="openDetail(0)">📋 View First Prospect</button>
      </div>
    </div>
  `;
  detail.appendChild(pc);
}

function openDetail(i){
  ACTIVE_INDEX=i;
  const x=RESULTS[i];
  document.querySelectorAll(".result").forEach((el,idx)=>el.classList.toggle("active",idx===i));
  const detail=document.getElementById("detail");
  detail.innerHTML="";
  const card=document.createElement("div");card.className="card";
  const hdr=document.createElement("div");hdr.className="card-header";
  const co=document.createElement("div");co.className="card-company";co.textContent=txt(x.Company);hdr.appendChild(co);
  const meta=document.createElement("div");meta.className="card-meta";
  meta.innerHTML=`<span>📍 ${safe([txt(x.City),txt(x.State)].filter(Boolean).join(", "))}</span>`+
    (x._distance?`<span>📏 ${x._distance} miles away</span>`:"")+
    (x["Employees on Site"]?`<span>👥 ${safe(x["Employees on Site"])} employees</span>`:"");
  hdr.appendChild(meta);card.appendChild(hdr);
  const body=document.createElement("div");body.className="card-body";
  const grid=document.createElement("div");grid.className="info-grid";
  [["📞 Phone",x.Phone],["✉️ Email",x["Company Email"]],["🌐 Website",x.Website],["🏢 Founded",x["Year Established"]]].forEach(([l,v])=>{
    if(!v)return;
    const item=document.createElement("div");item.className="info-item";
    item.innerHTML=`<div class="info-label">${l}</div><div class="info-value">${safe(v)}</div>`;
    grid.appendChild(item);
  });
  body.appendChild(grid);
  if(x.Score){
    const maxScore=Math.max(...RESULTS.map(r=>r.Score),20);
    const pct=Math.min(100,Math.round((x.Score/maxScore)*100));
    const sw=document.createElement("div");sw.className="score-bar-wrap";
    sw.innerHTML=`<div class="score-label">Sales Match Score</div><div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div><div class="score-value">${x.Score} <span style="font-size:13px;color:var(--muted);font-family:'DM Sans'">/ ${maxScore}</span></div>`;
    body.appendChild(sw);
  }
  const dv=document.createElement("div");dv.className="divider";body.appendChild(dv);
  const al=document.createElement("div");al.className="actions-label";al.textContent="Quick Actions";body.appendChild(al);
  const actions=document.createElement("div");actions.className="actions";
  if(x.Phone){const b=document.createElement("button");b.className="action-btn";b.innerHTML="📞 Call";b.onclick=()=>window.open("tel:"+x.Phone.replace(/[^0-9+]/g,""));actions.appendChild(b);}
  if(x["Company Email"]){const b=document.createElement("button");b.className="action-btn";b.innerHTML="✉️ Email";b.onclick=()=>window.open("mailto:"+x["Company Email"]);actions.appendChild(b);}
  const db=document.createElement("button");db.className="action-btn";db.innerHTML="🧭 Directions";
  db.onclick=()=>window.open("https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent([x.Address,x.City,x.State].filter(Boolean).join(" "))+"&travelmode=driving");
  actions.appendChild(db);
  if(x.Website){const b=document.createElement("button");b.className="action-btn";b.innerHTML="🌐 Website";const u=x.Website.startsWith("http")?x.Website:"https://"+x.Website;b.onclick=()=>window.open(u);actions.appendChild(b);}
  const mb=document.createElement("button");mb.className="action-btn maps";mb.innerHTML="📍 My Maps";
  mb.onclick=()=>window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent([txt(x.Company),txt(x.Address),txt(x.City),txt(x.State)].filter(Boolean).join(", ")));
  actions.appendChild(mb);
  const rb=document.createElement("button");rb.className="action-btn route";rb.innerHTML="🗺️ Route";
  rb.onclick=()=>window.open("https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent([txt(x.Address),txt(x.City),txt(x.State)].filter(Boolean).join(" "))+"&travelmode=driving");
  actions.appendChild(rb);
  body.appendChild(actions);card.appendChild(body);detail.appendChild(card);
}

function openAllRoute(){
  if(!RESULTS.length)return;
  const stops=RESULTS.slice(0,10);
  const origin=encodeURIComponent([txt(stops[0].Address),txt(stops[0].City),txt(stops[0].State)].filter(Boolean).join(" "));
  const dest=encodeURIComponent([txt(stops[stops.length-1].Address),txt(stops[stops.length-1].City),txt(stops[stops.length-1].State)].filter(Boolean).join(" "));
  let url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving`;
  if(stops.length>2){
    const wps=stops.slice(1,-1).map(x=>encodeURIComponent([txt(x.Address),txt(x.City),txt(x.State)].filter(Boolean).join(" "))).join("|");
    url+="&waypoints="+wps;
  }
  window.open(url);
}

function goHome(){
  document.getElementById("workspace").classList.remove("visible");
  document.getElementById("home").style.display="block";
  document.getElementById("kw").value="";
  document.getElementById("radiusLocation").value="";
  document.getElementById("radiusKeyword").value="";
  document.getElementById("routeBanner").classList.remove("visible");
  document.getElementById("geocodeStatus").className="";
  ACTIVE_STATES=[];ACTIVE_INDEX=-1;RADIUS_CENTER=null;
  document.querySelectorAll(".stateBtn").forEach(b=>b.classList.remove("active"));
}

load();
</script>
</body>
</html>
