<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>

<style>
body {
  font-family: Arial;
  background:#0b1833;
  color:white;
  padding:20px;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:8px;
  border-bottom:1px solid #333;
  text-align:left;
}

h1 {
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>Prospect {{{Radar}}} LIVE Dashboard</h1>

<div id="stats">
Total Prospects: 0 | High Priority: 0
</div>

<h3>High Priority Prospects</h3>

<table>
<thead>
<tr>
<th>Company</th>
<th>City</th>
<th>State</th>
<th>Score</th>
<th>Industry Match</th>
<th>Pkg Sales</th>
<th>Phone</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

// 🚨 THIS IS THE IMPORTANT FIX
// We now point to your LIVE RENDER BACKEND
const API = "https://radarpro-dashboard.onrender.com/data";

async function loadData(){

    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("stats").innerText =
      "Total Prospects: " + data.total +
      " | High Priority: " + data.high;

    const body = document.getElementById("tableBody");
    body.innerHTML = "";

    data.rows.forEach(r => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${r.Company}</td>
        <td>${r.City}</td>
        <td>${r.State}</td>
        <td>${r.Score}</td>
        <td>${r["Industry Match"]}</td>
        <td>${r["Pkg Sales"]}</td>
        <td>${r.Phone}</td>
        `;

        body.appendChild(tr);
    });
}

loadData();

</script>

</body>
</html>
