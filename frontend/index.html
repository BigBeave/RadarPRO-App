<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>RADAR PRO v6.1</title>

<style>
:root{
 --bg:#0b1220;
 --panel:#0f1a2f;
 --text:#e9eefc;
 --line:rgba(255,255,255,.12);
}

body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto}

.app{
 display:grid;
 grid-template-columns:420px 1fr;
 height:100vh;
 gap:12px;
 padding:12px;
}

.panel{
 background:var(--panel);
 border-radius:14px;
 border:1px solid var(--line);
 display:flex;
 flex-direction:column;
 overflow:hidden;
}

.topbar{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between}

.search{margin:10px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#0c1629;color:white}

.list{overflow:auto;flex:1}
.row{margin:8px;padding:14px;border:1px solid var(--line);border-radius:12px;cursor:pointer}
.row:hover{background:#132246}

.detail{padding:14px;overflow:auto;flex:1}

.hero{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}

.quick button{margin-right:8px;margin-top:8px;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#132246;color:white}

.box{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}

/* ===== MOBILE ===== */
@media(max-width:980px){
 .app{grid-template-columns:1fr;padding:0}
 .right{display:none}
}

/* FULLSCREEN MOBILE DETAIL */
.overlay{
 position:fixed;
 inset:0;
 background:#0b1220;
 display:none;
 flex-direction:column;
 z-index:100;
}
.overlay.on{display:flex}
.overlayTop{padding:14px;border-bottom:1px solid var(--line);font-weight:700}
</style>
</head>

<body>

<div class="app">

<section class="panel">
 <div class="topbar">
  RADAR PRO v6.1
  <span id="api">LIVE</span>
 </div>

 <input id="search" class="search" placeholder="Search anything…">

 <div id="list" class="list"></div>
</section>

<section class="panel right">
 <div class="topbar" id="detailTitle">Select Prospect</div>
 <div id="detail" class="detail"></div>
</section>

</div>

<!-- MOBILE OVERLAY -->
<div id="overlay" class="overlay">
 <div class="overlayTop">
  <button onclick="closeOverlay()">← Back</button>
 </div>
 <div id="detailMobile" class="detail"></div>
</div>

<script>
const API="https://radarpro-api.onrender.com/data"

const el=id=>document.getElementById(id)

const state={raw:[],index:[],filtered:[],selected:-1}

function safe(v){return (v??"").toString().trim()}

function buildIndex(){
 state.index=state.raw.map(r=>Object.values(r).join(" ").toLowerCase())
}

async function load(){
 const r=await fetch(API)
 const j=await r.json()
 state.raw=Array.isArray(j)?j:j.rows
 buildIndex()
 state.filtered=[...state.raw]
 renderList()
}

el("search").oninput=()=>{
 const q=safe(el("search").value).toLowerCase()
 if(!q) state.filtered=[...state.raw]
 else state.filtered=state.raw.filter((r,i)=>state.index[i].includes(q))
 renderList()
}

function renderList(){
 const root=el("list")
 root.innerHTML=""
 state.filtered.forEach((row,i)=>{
  const d=document.createElement("div")
  d.className="row"
  d.innerHTML=`<b>${row.Company||""}</b><br>${row.City||""}`
  d.onclick=()=>select(i)
  root.appendChild(d)
 })
}

function select(i){
 state.selected=i
 renderDetail()

 if(window.innerWidth<980){
   openOverlay()
 }
}

function buildDetailHTML(row){
 const addr=[row.Address,row.City,row.State,row.Zip].filter(Boolean).join(", ")
 const maps=addr?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`:""
 const web=row.Website?.startsWith("http")?row.Website:"https://"+(row.Website||"")

 return `
 <div class="hero">
  <h2>${row.Company||""}</h2>
  <div>${addr}</div>
  <div class="quick">
   ${row.Website?`<button onclick="window.open('${web}','_blank')">Website</button>`:`<button disabled>Website</button>`}
   ${addr?`<button onclick="window.open('${maps}','_blank')">Maps</button>`:`<button disabled>Maps</button>`}
   ${row["Company Email"]?`<button onclick="navigator.clipboard.writeText('${row["Company Email"]}')">Copy Email</button>`:""}
   ${row.Phone?`<button onclick="navigator.clipboard.writeText('${row.Phone}')">Copy Phone</button>`:""}
  </div>
 </div>

 <div class="box"><b>NAICS:</b> ${row["NAICS Code"]||""}</div>
 <div class="box"><b>Description:</b> ${row["Business Description"]||""}</div>
 `
}

function renderDetail(){
 if(state.selected<0)return
 const row=state.filtered[state.selected]
 const html=buildDetailHTML(row)

 el("detailTitle").textContent=row.Company||""
 el("detail").innerHTML=html
 el("detailMobile").innerHTML=html
}

function openOverlay(){el("overlay").classList.add("on")}
function closeOverlay(){el("overlay").classList.remove("on")}

load()
</script>

</body>
</html>
