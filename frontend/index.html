<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0b1c3a;
  color:#fff;
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  border-bottom:1px solid rgba(255,255,255,.1);
  padding:10px;
  text-align:left;
}

th {
  color:#9cc3ff;
}
</style>
</head>

<body>

<h1>Prospect {{{Radar}}} LIVE Dashboard</h1>

<h3 id="stats">Loading...</h3>

<h2>High Priority Prospects</h2>

<table>
<thead>
<tr>
<th>Company</th>
<th>City</th>
<th>State</th>
<th>Score</th>
<th>Industry Match</th>
<th>Pkg Sales</th>
<th>Phone</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

const API_URL = "https://radarpro-api.onrender.com/data";

async function loadData() {

  try {

    const res = await fetch(API_URL);
    const data = await res.json();

    // ✅ NEW STRUCTURE
    const rows = data.rows || [];

    document.getElementById("stats").innerText =
      `Total Prospects: ${data.total} | High Priority: ${data.highPriority}`;

    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    rows.forEach(row => {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row["Business Description"] || ""}</td>
        <td>${row.City || ""}</td>
        <td>${row.State || ""}</td>
        <td>${row.Score || ""}</td>
        <td>${row["Industry Match "] || ""}</td>
        <td>${row["Match for Pkg Sales "] || ""}</td>
        <td>${row.Phone || ""}</td>
      `;

      tableBody.appendChild(tr);

    });

  } catch (err) {

    document.getElementById("stats").innerText =
      "API ERROR — Backend not reachable";

    console.error(err);
  }
}

loadData();

</script>

</body>
</html>
