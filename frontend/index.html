<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar PRO | Advanced Mapping Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-panel: #161b22;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border: #30363d;
            --success: #238636;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: 60px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: white; font-weight: 400; }

        /* Container Layout */
        #app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Left Sidebar - Search and List */
        #sidebar {
            width: 380px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        .search-controls {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .state-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .state-pill {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 12px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .state-pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        #results-list {
            flex: 1;
            overflow-y: auto;
        }

        .result-card {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .result-card:hover { background: rgba(255,255,255,0.03); }
        .result-card.selected {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent);
        }
        .result-card .company-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .result-card .location {
            font-size: 13px;
            color: var(--text-muted);
        }
        .result-card .score-badge {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 11px;
            font-weight: bold;
            background: #238636;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Main Content - Split Screen */
        #content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Map Integration Area */
        #map-container {
            flex: 1;
            background: var(--bg-deep);
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }

        /* Floating Detail Overlay (Google Style) */
        #detail-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 360px;
            background: var(--bg-panel);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            display: none; /* Toggled via JS */
            flex-direction: column;
            max-height: calc(100% - 40px);
            z-index: 70;
            overflow: hidden;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .street-view-placeholder {
            width: 100%;
            height: 160px;
            background: #000;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .close-detail {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .detail-body {
            padding: 20px;
            overflow-y: auto;
        }

        .detail-body h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .detail-info-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            align-items: flex-start;
        }
        .info-icon { color: var(--accent); width: 20px; text-align: center; }
        .info-text { color: var(--text-muted); word-break: break-word; }
        .info-text strong { color: var(--text-main); display: block; }

        .action-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            background: var(--bg-deep);
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: var(--border);
        }
        .action-btn.primary {
            background: var(--accent);
            color: white;
            border: none;
        }
        .action-btn.primary:hover { background: var(--accent-hover); }

        /* Map Overlay loading state */
        #map-overlay-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            color: #fff;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; left: 0; top: 60px; bottom: 0; }
            #sidebar.hidden { transform: translateX(-100%); }
            #detail-panel { left: 10px; right: 10px; width: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">📡 RADAR <span>PRO</span></div>
        <div id="status-msg" style="font-size:12px;color:var(--text-muted)">Connected to Prospect Engine</div>
    </header>

    <div id="app-container">
        
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <div class="search-controls">
                <input type="text" id="search-box" class="search-input" placeholder="Filter by keyword...">
                <div class="state-filters" id="state-pill-container"></div>
                <button class="btn-primary" onclick="applyFilters()">Update Radar Results</button>
            </div>
            
            <div id="results-list">
                <div style="padding:20px;color:var(--text-muted);text-align:center;">Loading prospects...</div>
            </div>
        </aside>

        <!-- MAIN VISUALIZATION AREA -->
        <main id="content">
            
            <div id="map-container">
                <div id="map"></div>
                <div id="map-overlay-msg">Enter Google Maps API Key in code to activate interactive suite</div>
            </div>

            <!-- DYNAMIC DETAIL CARD -->
            <div id="detail-panel">
                <button class="close-detail" onclick="closeDetail()">×</button>
                <div id="streetview-thumb" class="street-view-placeholder"></div>
                
                <div class="detail-body" id="detail-content">
                    <!-- Populated by JS -->
                </div>
            </div>

        </main>
    </div>

    <!-- GOOGLE MAPS API - Note: USER NEEDS TO REPLACE API_KEY HERE -->
    <!-- Adding async deferred loading as per best practice instructions -->
    <script>
        // CONFIGURATION 
        const GOOGLE_MAPS_API_KEY = 'AIzaSyBkVk_B6cBwC9k4S7CL0nCPhsY75euyYoM'; // Replace this placeholder with real API key!
        
        let map;
        let markers = [];
        let geocoder;
        let activeInfoWindow;
        let masterData = [];
        let filteredData = [];
        let activeStates = [];
        const STATE_POOL = ["OH", "IN", "MI", "KY", "TN", "WV", "PA", "IL"];

        // 1. STARTUP
        async function init() {
            setupFilters();
            await loadProspectData();
            
            // Trigger runtime load of Google Maps if Key exists
            if (GOOGLE_MAPS_API_KEY && GOOGLE_MAPS_API_KEY !== 'YOUR_API_KEY_HERE') {
                loadGoogleMapsScript();
                document.getElementById('map-overlay-msg').style.display = 'none';
            }
        }

        function loadGoogleMapsScript() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=onMapsLoaded&libraries=marker`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        }

        function setupFilters() {
            const container = document.getElementById('state-pill-container');
            STATE_POOL.forEach(s => {
                const pill = document.createElement('div');
                pill.className = 'state-pill';
                pill.textContent = s;
                pill.onclick = () => {
                    pill.classList.toggle('active');
                    if (activeStates.includes(s)) {
                        activeStates = activeStates.filter(x => x !== s);
                    } else {
                        activeStates.push(s);
                    }
                };
                container.appendChild(pill);
            });
        }

        async function loadProspectData() {
            try {
                const response = await fetch('https://radarpro-api.onrender.com/data');
                const raw = await response.json();
                
                masterData = raw.map(row => {
                    let obj = {};
                    Object.keys(row).forEach(k => obj[k.trim()] = row[k]);
                    obj.Score = Number(obj.Score || 0);
                    
                    // Standardize specific common field variants used in display
                    obj.DispState = obj.State || obj["        State"] || "";
                    obj.DispAddress = obj.Address || obj.FullAddress || "";
                    return obj;
                });

                // Sort by match score descending by default
                masterData.sort((a,b) => b.Score - a.Score);
                applyFilters();

            } catch (err) {
                console.error("Fetch error", err);
                document.getElementById('results-list').innerHTML = '<div style="padding:20px;color:red;">API connection failed.</div>';
            }
        }

        // 2. RENDER LIST & INTERACTION
        function applyFilters() {
            const kw = document.getElementById('search-box').value.toLowerCase();
            
            filteredData = masterData.filter(p => {
                const matchState = activeStates.length === 0 || activeStates.includes(p.DispState);
                const matchText = !kw || Object.values(p).some(val => String(val).toLowerCase().includes(kw));
                return matchState && matchText;
            });

            renderList();
            
            // If map is ready, batch plot visible results
            if (window.google && map) {
                plotResultsOnMap();
            }
        }

        function renderList() {
            const listDiv = document.getElementById('results-list');
            if (filteredData.length === 0) {
                listDiv.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">No prospects found.</div>';
                return;
            }

            listDiv.innerHTML = filteredData.map((p, idx) => `
                <div class="result-card" id="card-${idx}" onclick="selectProspect(${idx})">
                    <div class="score-badge" style="background:${getScoreColor(p.Score)}">${p.Score}</div>
                    <div class="company-name">${p.Company || 'Unknown Entity'}</div>
                    <div class="location">${p.City || ''}, ${p.DispState}</div>
                </div>
            `).join('');
        }

        function getScoreColor(score) {
            if (score >= 15) return '#1a7f37'; // high
            if (score >= 10) return '#d29922'; // med
            return '#6e7681'; // low
        }

        // 3. MAPS INTEGRATION HANDLERS
        window.onMapsLoaded = function() {
            geocoder = new google.maps.Geocoder();
            
            // Premium Dark Mode Style Definition for Maps JS API
            const darkStyle = [
                { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#263c3f" }] },
                { featureType: "poi.park", elementType: "labels.text.fill", stylers: [{ color: "#6b9a76" }] },
                { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
                { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
                { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#746855" }] },
                { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 6,
                center: { lat: 39.9612, lng: -82.9988 }, // Midwest Center
                styles: darkStyle,
                mapTypeControl: false,
                streetViewControl: true,
                fullscreenControl: false
            });

            // After load, plot the default results
            plotResultsOnMap();
        };

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
        }

        // Batch plotting visible results (Top 50 limit for performance w/ Geocoding API quotas)
        function plotResultsOnMap() {
            clearMarkers();
            if (!filteredData.length) return;

            // Note: Ideally coordinates are pre-generated in database/CSV for zero latency.
            // For runtime display, we will only dynamically Geocode the top visible records, or rely on selection.
            // As best-practice, we will plot the Active Selection immediately.
        }

        // Main action trigger
        async function selectProspect(idx) {
            // UI Styling updates
            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
            const card = document.getElementById(`card-${idx}`);
            if (card) card.classList.add('selected');

            const p = filteredData[idx];
            
            // Render details in the side overlay
            renderDetailCard(p);
            
            // Scroll selection to top of panel context
            document.getElementById('detail-panel').style.display = 'flex';

            // Trigger advanced Maps functionalities if active
            const fullAddress = `${p.DispAddress}, ${p.City}, ${p.DispState}`;
            
            // Dynamic Streetview using Static Maps/Streetview API if enabled
            if (GOOGLE_MAPS_API_KEY && GOOGLE_MAPS_API_KEY !== 'YOUR_API_KEY_HERE') {
                const streetViewUrl = `https://maps.googleapis.com/maps/api/streetview?size=400x200&location=${encodeURIComponent(fullAddress)}&fov=90&heading=235&pitch=10&key=${GOOGLE_MAPS_API_KEY}`;
                document.getElementById('streetview-thumb').style.backgroundImage = `url('${streetViewUrl}')`;

                // Perform on-the-fly geocoding to center interactive map on facility
                geocoder.geocode({ address: fullAddress }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        const loc = results[0].geometry.location;
                        map.setCenter(loc);
                        map.setZoom(16);
                        
                        clearMarkers();
                        const marker = new google.maps.Marker({
                            map: map,
                            position: loc,
                            title: p.Company,
                            animation: google.maps.Animation.DROP
                        });
                        markers.push(marker);
                    }
                });
            } else {
                 document.getElementById('streetview-thumb').style.backgroundImage = 'linear-gradient(45deg, #242f3e, #0d1117)';
            }
        }

        function renderDetailCard(p) {
            const body = document.getElementById('detail-content');
            const fullAddress = `${p.DispAddress}, ${p.City}, ${p.DispState}`;

            body.innerHTML = `
                <h2>${p.Company || 'Unknown'}</h2>
                
                <div class="detail-info-row">
                    <div class="info-icon">📍</div>
                    <div class="info-text">
                        <strong>Physical Location</strong>
                        ${fullAddress}
                    </div>
                </div>

                <div class="detail-info-row">
                    <div class="info-icon">📞</div>
                    <div class="info-text">
                        <strong>Office Phone</strong>
                        ${p.Phone || 'Not Listed'}
                    </div>
                </div>

                <div class="detail-info-row">
                    <div class="info-icon">✉️</div>
                    <div class="info-text">
                        <strong>Company Contact</strong>
                        ${p["Company Email"] || 'No Email Available'}
                    </div>
                </div>

                <div class="detail-info-row">
                    <div class="info-icon">👥</div>
                    <div class="info-text">
                        <strong>Facility Size</strong>
                        ${p["Employees on Site"] || 'Unknown'} Employees
                    </div>
                </div>

                <div class="action-bar">
                    <a href="tel:${p.Phone || ''}" class="action-btn">Call Now</a>
                    <a href="mailto:${p["Company Email"] || ''}" class="action-btn">Send Email</a>
                    <a href="${formatWeb(p.Website)}" target="_blank" class="action-btn">Visit Website</a>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(fullAddress)}" target="_blank" class="action-btn primary">View Directions</a>
                </div>
            `;
        }

        function formatWeb(url) {
            if(!url) return '#';
            return url.startsWith('http') ? url : 'https://' + url;
        }

        function closeDetail() {
            document.getElementById('detail-panel').style.display = 'none';
            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
        }

        // Initialize lifecycle
        window.onload = init;
    </script>
</body>
</html>
