<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>

<style>
body{font-family:Arial;background:#071a2b;color:#fff;margin:0;padding:20px}
h1{margin-bottom:10px}
input,select,button{padding:8px;border-radius:6px;border:none;margin-right:8px}
button{cursor:pointer;background:#e6e6e6}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #1d3a56;text-align:left}
tr:hover{background:#0e2a44}
</style>
</head>

<body>
<h1>Prospect {{{Radar}}} LIVE Dashboard</h1>

<input id="keyword" placeholder="Search keyword">
<input id="minScore" placeholder="Min Score">
<select id="stateFilter">
<option value="ALL">All States</option>
</select>
<button id="goBtn">GO</button>

<div id="count">Loading...</div>

<table>
<thead>
<tr>
<th>Company</th>
<th>City</th>
<th>State</th>
<th>Score</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
let ALL_DATA = [];

// STREAMING API SOURCE (LOCKED)
const API_URL = "https://radarpro-api.onrender.com/data";

// ---------- LOAD DATA ----------
async function loadData(){
    try{
        const res = await fetch(API_URL);
        const json = await res.json();

        // NEW STREAM FORMAT SUPPORT
        ALL_DATA = json.items || json.data || json;

        populateStates(ALL_DATA);
        renderTable(ALL_DATA);
    }catch(e){
        document.getElementById("count").innerText="API ERROR";
        console.error(e);
    }
}

// ---------- BUILD STATE DROPDOWN ----------
function populateStates(data){
    const select = document.getElementById("stateFilter");

    // reset except ALL
    select.innerHTML = '<option value="ALL">All States</option>';

    const states = new Set();

    data.forEach(row=>{
        if(row.State && row.State.trim() !== ""){
            states.add(row.State.trim());
        }
    });

    Array.from(states).sort().forEach(st=>{
        const opt = document.createElement("option");
        opt.value = st;
        opt.textContent = st;
        select.appendChild(opt);
    });
}

// ---------- TABLE RENDER ----------
function renderTable(data){
    const body = document.getElementById("tableBody");
    body.innerHTML="";

    data.forEach(r=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
        <td>${r.Company||""}</td>
        <td>${r.City||""}</td>
        <td>${r.State||""}</td>
        <td>${r.Score||""}</td>`;
        body.appendChild(tr);
    });

    document.getElementById("count").innerText = `Total Prospects: ${data.length}`;
}

// ---------- GLOBAL SEARCH LOGIC ----------
function globalSearch(){
    const keyword = document.getElementById("keyword").value.toLowerCase();
    const state = document.getElementById("stateFilter").value;
    const minScore = parseInt(document.getElementById("minScore").value||"0");

    const filtered = ALL_DATA.filter(row=>{
        // FULL ROW STRING SEARCH (covers plastic logic everywhere)
        const fullText = Object.values(row).join(" ").toLowerCase();

        const keywordMatch = keyword==="" || fullText.includes(keyword);
        const stateMatch = state==="ALL" || row.State===state;
        const scoreMatch = (row.Score||0) >= minScore;

        return keywordMatch && stateMatch && scoreMatch;
    });

    renderTable(filtered);
}

// ---------- GO BUTTON ----------
document.getElementById("goBtn").addEventListener("click",globalSearch);

// INITIAL LOAD
loadData();
</script>

</body>
</html>
