<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0d223f;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

.left{
    width:55%;
    padding:20px;
    overflow:auto;
}

.right{
    width:45%;
    border-left:1px solid #2b4c74;
    padding:20px;
    overflow:auto;
}

.mobile-panel{
    position:fixed;
    top:0;
    right:-100%;
    width:100%;
    height:100%;
    background:#0d223f;
    z-index:999;
    transition:0.3s;
    overflow:auto;
    padding:20px;
}

.mobile-panel.open{
    right:0;
}

.company{
    padding:14px;
    border-bottom:1px solid #2b4c74;
    cursor:pointer;
}

.company:hover{
    background:#17365e;
}

button{
    background:#17365e;
    border:none;
    padding:10px;
    margin:6px 0;
    color:white;
    border-radius:8px;
    width:100%;
}

@media(max-width:900px){
    .container{
        display:block;
    }
    .left{
        width:100%;
    }
    .right{
        display:none;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="left">
        <h2>Prospect {{{Radar}}} LIVE Dashboard</h2>
        <div id="list"></div>
    </div>

    <div class="right" id="desktopPanel">
        ← Back<br>Select a prospect
    </div>
</div>

<div id="mobilePanel" class="mobile-panel"></div>

<script>

let DATA=[];

function renderList(arr){
    const list=document.getElementById("list");
    list.innerHTML="";
    arr.forEach((c,i)=>{
        const div=document.createElement("div");
        div.className="company";
        div.innerHTML="<b>"+(c.Company||"")+"</b><br>"+(c.City||"");
        div.onclick=()=>openProspect(i);
        list.appendChild(div);
    });
}

function buildPanel(c){
    return `
    <div>
        <b style="font-size:22px">${c.Company||""}</b><br><br>
        <b>Score:</b> ${c.Score||""}<br>
        <b>Industry:</b> ${c["Industry Match"]||""}<br>
        <b>Pkg Match:</b> ${c["Match for Pkg Sales "]||""}<br><br>

        <button onclick="window.open('${c.Website||""}')">Website</button>
        <button onclick="window.open('mailto:${c["Company Email"]||""}')">Email</button>
        <button onclick="window.open('https://maps.google.com/?q=${c.Address||""}')">Map</button>
    </div>
    `;
}

function openProspect(i){
    const c=DATA[i];

    if(window.innerWidth<900){
        const panel=document.getElementById("mobilePanel");
        panel.innerHTML="<button onclick='closeMobile()'>← Back</button>"+buildPanel(c);
        panel.classList.add("open");
    }else{
        document.getElementById("desktopPanel").innerHTML=buildPanel(c);
    }
}

function closeMobile(){
    document.getElementById("mobilePanel").classList.remove("open");
}

async function loadData(){
    try{
        const res=await fetch("https://radarpro-api.onrender.com/data");
        DATA=await res.json();
        renderList(DATA);
    }catch(e){
        console.log("DATA LOAD ERROR",e);
    }
}

loadData();

</script>
</body>
</html>
