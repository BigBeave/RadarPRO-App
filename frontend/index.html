<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar PRO LIVE Dashboard</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0f14;
    color:#e6edf3;
    margin:0;
}
header{
    background:#111827;
    padding:12px;
    font-weight:bold;
    text-align:center;
}
#searchBar{
    width:95%;
    margin:10px auto;
    display:block;
    padding:10px;
    font-size:14px;
    border-radius:8px;
    border:none;
}

/* ===== TABLE DESKTOP ===== */
table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
thead{
    position:sticky;
    top:0;
    background:#0f172a;
}
th,td{
    padding:6px 8px;
    border-bottom:1px solid #1f2937;
}
tr.selected{
    background:#1d4ed8;
}

/* ===== ACTION BUTTONS ===== */
.actions{
    display:flex;
    gap:6px;
}
button.action{
    background:#1f2937;
    color:white;
    border:none;
    padding:6px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}
button.action:hover{
    background:#2563eb;
}

/* ===== MOBILE CARD VIEW ===== */
.cards{
    display:none;
    padding:8px;
}
.card{
    background:#111827;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
}
.card.selected{
    outline:2px solid #1d4ed8;
}
.cardTitle{
    font-weight:bold;
    font-size:16px;
}
.cardLine{
    font-size:13px;
    opacity:.85;
    margin-top:2px;
}
.cardActions{
    margin-top:8px;
    display:flex;
    gap:8px;
}

/* MOBILE SWITCH */
@media(max-width:900px){
    table{display:none;}
    .cards{display:block;}
}
</style>
</head>

<body>

<header>Prospect {{{Radar}}} LIVE Dashboard</header>

<input id="searchBar" placeholder="Search ANY column…">

<!-- DESKTOP TABLE -->
<table>
<thead>
<tr id="headerRow"></tr>
</thead>
<tbody id="body"></tbody>
</table>

<!-- MOBILE CARDS -->
<div id="cards" class="cards"></div>

<script>

const API = "https://radarpro-api.onrender.com/data";

let ALL=[];
let FILTERED=[];
let SELECTED=JSON.parse(localStorage.getItem("radar_selected")||"[]");

const body=document.getElementById("body");
const cards=document.getElementById("cards");
const headerRow=document.getElementById("headerRow");
const searchBar=document.getElementById("searchBar");

async function load(){
    const res=await fetch(API);
    const json=await res.json();

    ALL=Array.isArray(json)?json:(json.items||json.data||[]);

    if(!ALL.length){
        body.innerHTML="<tr><td>NO DATA RECEIVED</td></tr>";
        return;
    }

    buildHeader(Object.keys(ALL[0]));
    FILTERED=ALL;
    render();
}

function buildHeader(cols){
    headerRow.innerHTML="";
    cols.forEach(c=>{
        const th=document.createElement("th");
        th.textContent=c;
        headerRow.appendChild(th);
    });
    const act=document.createElement("th");
    act.textContent="Actions";
    headerRow.appendChild(act);
}

function toggleSelect(idx,el){
    const i=SELECTED.indexOf(idx);
    if(i>-1){
        SELECTED.splice(i,1);
        el.classList.remove("selected");
    }else{
        SELECTED.push(idx);
        el.classList.add("selected");
    }
    localStorage.setItem("radar_selected",JSON.stringify(SELECTED));
}

function actionButtons(row){
    const wrap=document.createElement("div");
    wrap.className="actions";

    const call=document.createElement("button");
    call.textContent="📞";
    call.className="action";
    call.onclick=e=>{
        e.stopPropagation();
        window.open("tel:"+(row.Phone||""));
    };

    const web=document.createElement("button");
    web.textContent="🌐";
    web.className="action";
    web.onclick=e=>{
        e.stopPropagation();
        window.open(row.Website||"#","_blank");
    };

    const map=document.createElement("button");
    map.textContent="🧭";
    map.className="action";
    map.onclick=e=>{
        e.stopPropagation();
        const addr=encodeURIComponent(
            (row.Address||"")+" "+(row.City||"")+" "+(row.State||"")
        );
        window.open("https://www.google.com/maps/search/?api=1&query="+addr);
    };

    wrap.appendChild(call);
    wrap.appendChild(web);
    wrap.appendChild(map);
    return wrap;
}

function render(){

    body.innerHTML="";
    cards.innerHTML="";

    const frag=document.createDocumentFragment();
    const cardFrag=document.createDocumentFragment();

    const MAX=500;
    const rows=FILTERED.slice(0,MAX);

    rows.forEach((row,idx)=>{

        /* ===== TABLE ROW ===== */
        const tr=document.createElement("tr");
        if(SELECTED.includes(idx)) tr.classList.add("selected");

        Object.values(row).forEach(v=>{
            const td=document.createElement("td");
            td.textContent=v||"";
            tr.appendChild(td);
        });

        const actionTD=document.createElement("td");
        actionTD.appendChild(actionButtons(row));
        tr.appendChild(actionTD);

        tr.onclick=()=>toggleSelect(idx,tr);
        frag.appendChild(tr);

        /* ===== MOBILE CARD ===== */
        const card=document.createElement("div");
        card.className="card";
        if(SELECTED.includes(idx)) card.classList.add("selected");

        const title=document.createElement("div");
        title.className="cardTitle";
        title.textContent=row.Company||row["Company"]||"Business";

        const city=document.createElement("div");
        city.className="cardLine";
        city.textContent=(row.City||"")+" "+(row.State||"");

        const industry=document.createElement("div");
        industry.className="cardLine";
        industry.textContent=row["Business Description"]||"";

        const act=document.createElement("div");
        act.className="cardActions";
        act.appendChild(actionButtons(row));

        card.appendChild(title);
        card.appendChild(city);
        card.appendChild(industry);
        card.appendChild(act);

        card.onclick=()=>toggleSelect(idx,card);

        cardFrag.appendChild(card);
    });

    body.appendChild(frag);
    cards.appendChild(cardFrag);
}

searchBar.addEventListener("input",()=>{
    const q=searchBar.value.toLowerCase();
    if(!q){FILTERED=ALL;render();return;}

    FILTERED=ALL.filter(r=>{
        return Object.values(r).some(v=>
            String(v||"").toLowerCase().includes(q)
        );
    });

    render();
});

load();

</script>

</body>
</html>
