<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar PRO LIVE Dashboard</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0f14;
    color:#e6edf3;
    margin:0;
}
header{
    background:#111827;
    padding:12px;
    font-weight:bold;
}
#searchBar{
    width:98%;
    margin:10px;
    padding:8px;
    font-size:14px;
    border-radius:6px;
    border:none;
}
table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
thead{
    position:sticky;
    top:0;
    background:#0f172a;
}
th,td{
    padding:6px 8px;
    border-bottom:1px solid #1f2937;
}
tr.selected{
    background:#1d4ed8;
}
button.action{
    background:#1f2937;
    color:white;
    border:none;
    padding:3px 6px;
    margin-right:4px;
    border-radius:4px;
    cursor:pointer;
}
button.action:hover{
    background:#2563eb;
}
</style>
</head>

<body>

<header>Prospect {{{Radar}}} LIVE Dashboard</header>

<input id="searchBar" placeholder="Search ANY column…">

<table>
<thead>
<tr id="headerRow"></tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const API = "https://radarpro-api.onrender.com/data";

let ALL = [];
let FILTERED = [];
let SELECTED = JSON.parse(localStorage.getItem("radar_selected") || "[]");

const body = document.getElementById("body");
const headerRow = document.getElementById("headerRow");
const searchBar = document.getElementById("searchBar");

async function load(){

    const res = await fetch(API);
    const json = await res.json();

    ALL = Array.isArray(json) ? json : (json.items||json.data||[]);

    if(!ALL.length){
        body.innerHTML="<tr><td>NO DATA RECEIVED</td></tr>";
        return;
    }

    buildHeader(Object.keys(ALL[0]));
    FILTERED = ALL;
    render();
}

function buildHeader(cols){
    headerRow.innerHTML="";
    cols.forEach(c=>{
        const th=document.createElement("th");
        th.textContent=c;
        headerRow.appendChild(th);
    });

    const act=document.createElement("th");
    act.textContent="Actions";
    headerRow.appendChild(act);
}

function render(){

    body.innerHTML="";
    const frag=document.createDocumentFragment();

    // 🚀 PERFORMANCE SAFE LIMIT
    const MAX = 500;
    const rows = FILTERED.slice(0,MAX);

    rows.forEach((row,idx)=>{

        const tr=document.createElement("tr");

        if(SELECTED.includes(idx)) tr.classList.add("selected");

        Object.values(row).forEach(v=>{
            const td=document.createElement("td");
            td.textContent=v||"";
            tr.appendChild(td);
        });

        const actionTD=document.createElement("td");

        const callBtn=document.createElement("button");
        callBtn.textContent="📞";
        callBtn.className="action";
        callBtn.onclick=()=>window.open("tel:"+ (row.Phone||""));

        const webBtn=document.createElement("button");
        webBtn.textContent="🌐";
        webBtn.className="action";
        webBtn.onclick=()=>window.open(row.Website||"#","_blank");

        const mapBtn=document.createElement("button");
        mapBtn.textContent="🧭";
        mapBtn.className="action";
        mapBtn.onclick=()=>{
            const addr = encodeURIComponent(
                (row.Address||"")+" "+(row.City||"")+" "+(row.State||"")
            );
            window.open("https://www.google.com/maps/search/?api=1&query="+addr);
        };

        actionTD.appendChild(callBtn);
        actionTD.appendChild(webBtn);
        actionTD.appendChild(mapBtn);
        tr.appendChild(actionTD);

        tr.onclick=()=>{
            const i=SELECTED.indexOf(idx);
            if(i>-1){
                SELECTED.splice(i,1);
                tr.classList.remove("selected");
            }else{
                SELECTED.push(idx);
                tr.classList.add("selected");
            }
            localStorage.setItem("radar_selected",JSON.stringify(SELECTED));
        };

        frag.appendChild(tr);
    });

    body.appendChild(frag);
}

searchBar.addEventListener("input",()=>{
    const q=searchBar.value.toLowerCase();

    if(!q){
        FILTERED=ALL;
        render();
        return;
    }

    FILTERED = ALL.filter(r=>{
        return Object.values(r).some(v=>
            String(v||"").toLowerCase().includes(q)
        );
    });

    render();
});

load();

</script>

</body>
</html>
