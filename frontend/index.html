<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>
<style>
body{font-family:Arial;background:#0d1b2a;color:white;margin:0;padding:20px}
input,select,button{padding:8px;margin:5px;border-radius:6px;border:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #1b263b}
tr:hover{background:#1b263b;cursor:pointer}
</style>
</head>
<body>

<h2>Prospect {{{Radar}}} LIVE Dashboard</h2>

<div>
<input id="searchBox" placeholder="Search keyword">
<input id="minScore" placeholder="Min Score">
<select id="stateSelect"><option value="">All States</option></select>
<button onclick="runSearch()">GO</button>
</div>

<div id="counts">Loading...</div>

<table>
<thead>
<tr>
<th>Company</th>
<th>City</th>
<th>State</th>
<th>Score</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>

const API_URL = "https://radarpro-api.onrender.com/data";

let ALL_ROWS = [];
let FILTERED = [];

async function loadData(){

const res = await fetch(API_URL);
const data = await res.json();

/*
  BULLETPROOF API FORMAT DETECTION
*/
if(Array.isArray(data)){
  ALL_ROWS = data;
}else if(Array.isArray(data.items)){
  ALL_ROWS = data.items;
}else if(Array.isArray(data.rows)){
  ALL_ROWS = data.rows;
}else{
  ALL_ROWS = [];
}

ALL_ROWS = ALL_ROWS.map(r=>({
  ...r,
  _searchBlob:Object.values(r).join(" ").toLowerCase()
}));

populateStates();
updateCounts();
renderRows(ALL_ROWS);

}

function populateStates(){

const states=[...new Set(ALL_ROWS.map(r=>r.State).filter(Boolean))].sort();

const sel=document.getElementById("stateSelect");
states.forEach(s=>{
  const opt=document.createElement("option");
  opt.value=s;
  opt.textContent=s;
  sel.appendChild(opt);
});

}

function runSearch(){

const q=document.getElementById("searchBox").value.toLowerCase().trim();
const tokens=q.split(" ").filter(Boolean);
const state=document.getElementById("stateSelect").value;
const minScore=parseInt(document.getElementById("minScore").value)||0;

FILTERED=ALL_ROWS.filter(r=>{

if(state && r.State!==state) return false;

if(Number(r.Score||0)<minScore) return false;

if(tokens.length){
  for(const t of tokens){
    if(!r._searchBlob.includes(t)) return false;
  }
}

return true;

});

updateCounts();
renderRows(FILTERED);

}

function updateCounts(){
document.getElementById("counts").textContent=
`Total Prospects: ${ALL_ROWS.length}`;
}

function renderRows(rows){

const body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach(r=>{
const tr=document.createElement("tr");
tr.innerHTML=`
<td>${r.Company||""}</td>
<td>${r.City||""}</td>
<td>${r.State||""}</td>
<td>${r.Score||""}</td>`;
body.appendChild(tr);
});

}

loadData();

</script>
</body>
</html>
