<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#0b1e3a;
    color:white;
}

/* ===== DESKTOP LAYOUT ===== */
.container {
    display:flex;
    height:100vh;
}

.list {
    width:45%;
    overflow-y:auto;
    padding:20px;
}

.details {
    width:55%;
    border-left:1px solid #1c3c6b;
    padding:20px;
    overflow-y:auto;
}

/* ===== MOBILE MODE ===== */
@media (max-width: 900px){

.container{
    display:block;
}

.list{
    width:100%;
}

.details{
    position:fixed;
    top:0;
    right:-100%;
    width:100%;
    height:100%;
    background:#0b1e3a;
    transition:0.3s;
    z-index:999;
}

.details.show{
    right:0;
}

.closeBtn{
    background:#1c3c6b;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    text-align:center;
}
}

.card{
    padding:15px;
    border-bottom:1px solid #1c3c6b;
    cursor:pointer;
}

.card:hover{
    background:#122c55;
}

button{
    background:#1c3c6b;
    color:white;
    border:none;
    padding:8px 12px;
    margin:5px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<h2 style="padding:20px;">Prospect {{{Radar}}} LIVE Dashboard</h2>

<div class="container">

<div class="list" id="list"></div>

<div class="details" id="details">
<div class="closeBtn" onclick="closePanel()">⬅ Back</div>
<div id="detailContent">Select a prospect</div>
</div>

</div>

<script>

let prospects=[];

fetch("/data")
.then(r=>r.json())
.then(data=>{
    prospects=data.rows;
    renderList(prospects);
});

function renderList(arr){
    let html="";
    arr.forEach((p,i)=>{
        html+=`
        <div class="card" onclick="showDetails(${i})">
            <b>${p.Company}</b><br>
            ${p.City || ""} ${p.State || ""}
        </div>`;
    });
    document.getElementById("list").innerHTML=html;
}

function showDetails(i){
    let p=prospects[i];

    let html=`
        <h2>${p.Company}</h2>
        <p><b>Score:</b> ${p.Score}</p>
        <p><b>Industry:</b> ${p["Industry Match"]}</p>
        <p><b>Pkg Match:</b> ${p["Match for Pkg Sales"]}</p>
        <p>${p["Business Description"] || ""}</p>
    `;

    document.getElementById("detailContent").innerHTML=html;

    if(window.innerWidth < 900){
        document.getElementById("details").classList.add("show");
    }
}

function closePanel(){
    document.getElementById("details").classList.remove("show");
}

</script>

</body>
</html>
