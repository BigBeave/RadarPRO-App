<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prospect {{{Radar}}} LIVE Dashboard</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0b0f14;
    color:#e6edf3;
    margin:0;
}

header{
    background:#0f172a;
    padding:14px;
    text-align:center;
    font-weight:bold;
}

#search{
    width:95%;
    margin:10px auto;
    display:block;
    padding:10px;
    border-radius:6px;
    border:none;
    font-size:16px;
}

/* ===== TABLE (DESKTOP) ===== */

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    padding:10px;
    font-size:13px;
}

td{
    padding:10px;
    border-bottom:1px solid #111827;
    font-size:13px;
}

/* ===== MOBILE CARDS ===== */

#cards{
    display:none;
    padding:10px;
}

.card{
    background:#0f172a;
    border-radius:10px;
    padding:14px;
    margin-bottom:12px;
}

.card-title{
    font-weight:bold;
    font-size:16px;
    margin-bottom:6px;
}

.card-row{
    font-size:13px;
    margin:2px 0;
    color:#cbd5e1;
}

/* ===== MOBILE BREAKPOINT ===== */

@media(max-width:900px){

    table{
        display:none;
    }

    #cards{
        display:block;
    }
}

</style>
</head>

<body>

<header>Prospect {{{Radar}}} LIVE Dashboard</header>

<input id="search" placeholder="Search ANY column..." onkeyup="filterData()">

<table id="table">
<thead>
<tr>
<th>Score</th>
<th>Industry</th>
<th>Size</th>
<th>Products</th>
<th>Pkg</th>
<th>ID</th>
<th>Description</th>
<th>Address</th>
<th>City</th>
<th>State</th>
<th>Zip</th>
<th>Phone</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="cards"></div>

<script>

let masterData = [];

async function loadData(){

    const res = await fetch("/data");
    const json = await res.json();

    masterData = json.items || [];

    render(masterData);
}

function render(data){

    const tbody = document.getElementById("tbody");
    const cards = document.getElementById("cards");

    tbody.innerHTML="";
    cards.innerHTML="";

    data.forEach(row=>{

        /* ===== TABLE ROW ===== */

        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${row.Score||""}</td>
        <td>${row["Industry Match"]||""}</td>
        <td>${row["Company Size"]||""}</td>
        <td>${row["Match for my Products - Services"]||""}</td>
        <td>${row["Match for Pkg Sales"]||""}</td>
        <td>${row["Company ID"]||""}</td>
        <td>${row["Business Description"]||""}</td>
        <td>${row.Address||""}</td>
        <td>${row.City||""}</td>
        <td>${row.State||""}</td>
        <td>${row.Zip||""}</td>
        <td>${row.Phone||""}</td>
        `;

        tbody.appendChild(tr);

        /* ===== MOBILE CARD ===== */

        const card = document.createElement("div");
        card.className="card";

        card.innerHTML = `
        <div class="card-title">${row.Company||""}</div>
        <div class="card-row">Score: ${row.Score||""}</div>
        <div class="card-row">${row["Business Description"]||""}</div>
        <div class="card-row">${row.Address||""}, ${row.City||""} ${row.State||""}</div>
        <div class="card-row">${row.Phone||""}</div>
        `;

        cards.appendChild(card);
    });
}

function filterData(){

    const term = document.getElementById("search").value.toLowerCase();

    const filtered = masterData.filter(row=>{

        return Object.values(row).join(" ").toLowerCase().includes(term);
    });

    render(filtered);
}

loadData();

</script>

</body>
</html>
