<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar PRO</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0c0f14;
    color:white;
    margin:0;
    padding:12px;
}

#searchBar{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-bottom:12px;
    border-radius:8px;
    border:none;
}

.card{
    background:#161b22;
    margin-bottom:12px;
    padding:14px;
    border-radius:10px;
    box-shadow:0 0 6px rgba(0,0,0,0.4);
}

.cardTitle{
    font-size:18px;
    font-weight:bold;
    margin-bottom:6px;
}

.row{
    font-size:14px;
    margin:2px 0;
    opacity:.9;
}

@media(min-width:700px){
    .card{
        max-width:900px;
        margin:auto;
        margin-bottom:14px;
    }
}
</style>
</head>

<body>

<input id="searchBar" placeholder="Search any column...">

<div id="results"></div>

<script>

let masterData = [];

async function loadData(){
    const res = await fetch("/data");
    const json = await res.json();

    masterData = json.items || json; // supports raw array OR items wrapper
    render(masterData);
}

function render(data){

    const container = document.getElementById("results");
    container.innerHTML = "";

    data.forEach(row => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="cardTitle">${row.Company || ""}</div>

            <div class="row"><b>City:</b> ${row.City || ""}</div>
            <div class="row"><b>State:</b> ${row.State || ""}</div>
            <div class="row"><b>Industry:</b> ${row["Primary SIC Code"] || ""}</div>
            <div class="row"><b>Employees:</b> ${row["Employees on Site"] || ""}</div>
            <div class="row"><b>Annual Sales:</b> ${row["Annual Sales"] || ""}</div>
        `;

        container.appendChild(div);
    });
}

document.getElementById("searchBar").addEventListener("input", e => {

    const term = e.target.value.toLowerCase();

    const filtered = masterData.filter(obj =>
        Object.values(obj).some(val =>
            String(val).toLowerCase().includes(term)
        )
    );

    render(filtered);
});

loadData();

</script>

</body>
</html>
