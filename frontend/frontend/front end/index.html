<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radar PRO</title>

<style>
body{
    margin:0;
    padding:14px;
    background:#0c0f14;
    color:white;
    font-family:Arial, sans-serif;
}

#searchBar{
    width:100%;
    padding:14px;
    font-size:16px;
    border-radius:10px;
    border:none;
    margin-bottom:14px;
}

#results{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
}

/* CARD BASE */
.card{
    background:#161b22;
    border-radius:12px;
    padding:16px;
    box-shadow:0 0 8px rgba(0,0,0,.45);
    width:100%;
    max-width:420px;
}

/* DESKTOP CARD WIDTH */
@media(min-width:900px){
    .card{
        max-width:700px;
        width:48%;
    }
}

.cardTitle{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
}

.row{
    font-size:14px;
    opacity:.9;
}

.label{
    font-weight:bold;
    opacity:.8;
}
</style>
</head>

<body>

<input id="searchBar" placeholder="Search any column...">
<div id="results"></div>

<script>

let masterData = [];

async function loadData(){
    const res = await fetch("/data");
    const json = await res.json();

    /* SUPPORTS STREAMING BACKEND FORMAT */
    masterData = json.items || json;

    render(masterData);
}

function buildCard(row){

    return `
        <div class="card">
            <div class="cardTitle">${row.Company || ""}</div>

            <div class="grid">
                <div class="row"><span class="label">City:</span> ${row.City || ""}</div>
                <div class="row"><span class="label">State:</span> ${row.State || ""}</div>
                <div class="row"><span class="label">Employees:</span> ${row["Employees on Site"] || ""}</div>
                <div class="row"><span class="label">Annual Sales:</span> ${row["Annual Sales"] || ""}</div>
                <div class="row"><span class="label">SIC:</span> ${row["Primary SIC Code"] || ""}</div>
                <div class="row"><span class="label">Industry Match:</span> ${row["Industry Match"] || ""}</div>
            </div>
        </div>
    `;
}

function render(data){

    const container = document.getElementById("results");
    container.innerHTML = data.map(buildCard).join("");

}

document.getElementById("searchBar").addEventListener("input", e => {

    const term = e.target.value.toLowerCase();

    const filtered = masterData.filter(obj =>
        Object.values(obj).some(val =>
            String(val).toLowerCase().includes(term)
        )
    );

    render(filtered);
});

loadData();

</script>

</body>
</html>
